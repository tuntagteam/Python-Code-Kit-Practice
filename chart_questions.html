
<!DOCTYPE html>
<html>
<body style="font-family: Arial;">

<h2>Question 1: Bar Chart</h2>
<svg width="600" height="350">
  <text x="190" y="30" font-size="20" font-weight="bold">Students Enrolled by Course</text>

  <rect x="80" y="100" width="60" height="180" fill="#8ecae6"/>

  <text x="85" y="305">Scratch</text>

</svg>

<h2>Question 2: Pie Chart</h2>
<svg width="500" height="350">
  <text x="135" y="30" font-size="20" font-weight="bold">Devices Used by Students</text>

  <circle cx="180" cy="170" r="100" fill="#ddd"/>
  <path d="M180 170 L180 70 A100 100 0 0 1 275 200 Z" fill="#8ecae6"/>
  <path d="M180 170 L275 200 A100 100 0 0 1 150 265 Z" fill="#90be6d"/>
  <path d="M180 170 L150 265 A100 100 0 0 1 85 140 Z" fill="#f9c74f"/>
  <path d="M180 170 L85 140 A100 100 0 0 1 180 70 Z" fill="#f9844a"/>

  <text x="320" y="120">Laptop 40%</text>
  <text x="320" y="150">Tablet 25%</text>
  <text x="320" y="180">Desktop 20%</text>
  <text x="320" y="210">Phone 15%</text>
</svg>

<h2>Question 3: Line Chart</h2>
<svg width="600" height="350">
  <text x="180" y="30" font-size="20" font-weight="bold">Average Coding Test Scores</text>

  <polyline points="80,250 160,220 240,200 320,170 400,140 480,100"

  <circle cx="240" cy="200" r="6" fill="#219ebc"/>

  <text x="315" y="300">Apr</text>

</body>
</html>
